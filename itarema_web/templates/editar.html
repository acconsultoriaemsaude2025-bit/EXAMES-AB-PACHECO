{% extends "base.html" %}
{% block title %}Editar Autorização{% endblock %}
{% block icon %}pencil-square{% endblock %}
{% block page_title %}Editar Autorização #{{ row.id }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header" style="background:#1F3864;color:#fff">
        <i class="bi bi-pencil-square me-2"></i>Editar Autorização
      </div>
      <div class="card-body">
        <form method="post">
          <div class="row g-2">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Nº Autorização</label>
              <input name="numero_autorizacao" type="text" class="form-control"
                     value="{{ row.numero_autorizacao or '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Data <span class="text-danger">*</span></label>
              <input name="data_autorizacao" type="text" class="form-control"
                     value="{{ fmt_data(row.data_autorizacao) }}" placeholder="DD/MM/AAAA" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Status</label>
              <select name="status" class="form-select">
                {% for st in ['AUTORIZADO','PENDENTE','REALIZADO','CANCELADO'] %}
                <option {% if row.status==st %}selected{% endif %}>{{ st }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Paciente <span class="text-danger">*</span></label>
              <input name="nome_paciente" type="text" class="form-control"
                     value="{{ row.nome_paciente }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">CPF / CNS</label>
              <input name="cpf_cns" type="text" class="form-control"
                     value="{{ row.cpf_cns or '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Exame</label>
              <input type="text" class="form-control" disabled
                     value="{{ row.codigo_exame }} – {{ row.descricao_exame or '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Qtde</label>
              <input type="text" class="form-control" disabled value="{{ row.quantidade_liberada }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Val. Unit.</label>
              <input type="text" class="form-control" disabled value="{{ fmt_brl(row.valor_unitario) }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Val. Total</label>
              <input type="text" class="form-control fw-bold text-success" disabled
                     value="{{ fmt_brl(row.valor_total) }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Responsável</label>
              <input name="responsavel" type="text" class="form-control"
                     value="{{ row.responsavel or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Observações</label>
              <input name="observacoes" type="text" class="form-control"
                     value="{{ row.observacoes or '' }}">
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Salvar Alterações
            </button>
            <a href="{{ url_for('historico') }}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
