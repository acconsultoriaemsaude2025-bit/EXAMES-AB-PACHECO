<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Controle de Exames Itarema</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #eef2f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 420px; border: none; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    .login-header { background: #1F3864; border-radius: 14px 14px 0 0; padding: 32px 24px 24px; text-align: center; }
    .login-header i { font-size: 2.8rem; color: #f8c300; }
    .login-header h4 { color: #fff; margin: 10px 0 2px; font-weight: 700; }
    .login-header small { color: rgba(255,255,255,.65); font-size: .82rem; }
    .btn-login { background: #1F3864; border: none; font-weight: 600; letter-spacing: .03em; }
    .btn-login:hover { background: #162b4d; }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <i class="bi bi-hospital"></i>
    <h4>Secretaria Municipal de Saúde</h4>
    <small>Itarema/CE – Controle de Exames Laboratoriais</small>
  </div>
  <div class="card-body p-4">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" autocomplete="off">
      <div class="mb-3">
        <label class="form-label fw-semibold">Login</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input name="login" type="text" class="form-control" placeholder="Seu login" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input name="senha" id="senhaInput" type="password" class="form-control" placeholder="Sua senha" required>
          <button type="button" class="btn btn-outline-secondary" onclick="toggleSenha()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
      <div class="text-center mt-3">
        <a href="/recuperar-senha" style="font-size:.82rem;color:#1F3864;text-decoration:none">
          <i class="bi bi-key me-1"></i>Esqueceu a senha?
        </a>
      </div>
    </form>
  </div>
  <div class="card-footer text-center text-muted py-2" style="font-size:.75rem;border-radius:0 0 14px 14px">
    Contrato Nº {{ CONTRATO_NUM }} | {{ CONTRATO_EMP }}
  </div>
</div>
<script>
function toggleSenha(){
  const inp = document.getElementById('senhaInput');
  const ico = document.getElementById('eyeIcon');
  if(inp.type === 'password'){ inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
